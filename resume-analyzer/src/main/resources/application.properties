spring.application.name=resume-analyzer

# JWT — must be set via environment variable (no default to force explicit configuration)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Database
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# RapidAPI (primary) — must be set via environment variable
rapidapi.key=${RAPIDAPI_KEY}
rapidapi.host=jsearch.p.rapidapi.com

# OpenWebNinja (fallback) — used when RapidAPI quota is exhausted
openwebninja.key=${OPENWEBNINJA_KEY}
openwebninja.host=api.openwebninja.com

# Python AI service
app.ai-service.base-url=${AI_SERVICE_URL:http://localhost:8000}

# File uploads — use relative path as default (no OS-specific paths)
app.upload-dir=${UPLOAD_DIR:./uploads}

# AI service secret — must be set via environment variable
app.ai-service.secret=${AI_SERVICE_SECRET}

# Rate limiting
app.rate-limit.auth.capacity=10
app.rate-limit.auth.refill-per-minute=10

# Actuator — expose only health, hide details
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

#Cloudinary
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

# Email (SMTP) — for password reset emails
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URL
app.frontend-url=${FRONTEND_URL:http://localhost:3000}